<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historial de Uso</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../css/paginas/Historial de Uso/historialUso.css">
</head>

<body>

<div class="container mt-4">

  <!-- HEADER -->
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3>📦 Historial de Uso</h3>

    <input 
      type="text" 
      id="buscador" 
      class="form-control w-25" 
      placeholder="Buscar..."
    >
  </div>

  <!-- STATS -->
  <div class="row mb-3">
    <div class="col-md-3">
      <div class="card p-3 text-center">
        <h6>Total registros</h6>
        <h4 id="total">0</h4>
      </div>
    </div>
  </div>

  <!-- TABLA -->
  <div class="card p-3">
    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Ref Interna</th>
            <th>Usuario</th>
            <th>Zona</th>
            <th>Cantidad</th>
            <th>Fecha</th>
          </tr>
        </thead>
        <tbody id="tabla"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
const API = "https://buscador-refaccionesbackend.onrender.com";

let historial = [];

async function cargarHistorial() {
  const res = await fetch(`${API}/historial-uso`);
  historial = await res.json();

  document.getElementById("total").textContent = historial.length;

  renderTabla(historial);
}

function renderTabla(data) {
  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  data.forEach(item => {
    tabla.innerHTML += `
      <tr>
        <td><strong>${item.nombre}</strong></td>
        <td>${item.refinterna}</td>
        <td><span class="badge badge-user">${item.usuario}</span></td>
        <td><span class="badge badge-zona">${item.zona}</span></td>
        <td>${item.cantidad}</td>
        <td>${new Date(item.fecha).toLocaleString()}</td>
      </tr>
    `;
  });
}

// 🔍 BUSCADOR
document.getElementById("buscador").addEventListener("input", e => {
  const texto = e.target.value.toLowerCase();

  const filtrado = historial.filter(item =>
    item.nombre.toLowerCase().includes(texto) ||
    item.refinterna.toLowerCase().includes(texto) ||
    item.usuario.toLowerCase().includes(texto) ||
    item.zona.toLowerCase().includes(texto)
  );

  renderTabla(filtrado);
});

cargarHistorial();
</script>

</body>
</html>
