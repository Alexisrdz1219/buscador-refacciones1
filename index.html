<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Inicio de Sesión | IEMCO</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .login-card {
            background: #ffffff;
            border: none;
            border-radius: 1.25rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
        }

        .logo-container img {
            max-width: 180px;
            height: auto;
            margin-bottom: 1.5rem;
        }

        .form-control {
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            border: 1px solid #dee2e6;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            box-shadow: 0 0 0 4px rgba(113, 44, 249, 0.1);
            border-color: #712cf9;
        }

        .btn-login {
            background-color: #712cf9;
            border: none;
            border-radius: 0.75rem;
            padding: 0.8rem;
            font-weight: 600;
            transition: transform 0.2s ease;
        }

        .btn-login:hover {
            background-color: #5a23c8;
            transform: translateY(-1px);
        }

        .footer-text {
            font-size: 0.85rem;
            color: #6c757d;
            margin-top: 2rem;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="login-card text-center">
        
        <div class="logo-container">
            <img src="https://iemcousa.com/application/files/9615/2838/9508/logo.png" alt="IEMCO Logo">
        </div>

        <h3 class="fw-bold mb-1">Bienvenido</h3>
        <p class="text-muted mb-4">Accede a tu cuenta institucional</p>

        <form id="loginForm" class="text-start">
            <div class="mb-3">
                <label for="email" class="form-label small fw-semibold">Correo Electrónico</label>
                <input type="email" class="form-control" id="email" placeholder="nombre@ejemplo.com" required>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label small fw-semibold">Contraseña</label>
                <input type="password" class="form-control" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary btn-login w-100">Entrar</button>
        </form>

        <p class="footer-text">&copy; CONTENEDORES IEM - 2026</p>
    </div>
</div>

<script src="js/login.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
