<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editar Refacción | Sistema IEMCO</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  body{
  background:#f7f7f8;
  font-family:'Inter',sans-serif;
}

.container-edit{
  max-width:720px;
  margin:40px auto;
}

.card-clean{
  background:#fff;
  border-radius:16px;
  box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

.form-clean label{
  font-size:.75rem;
  font-weight:600;
  color:#444;
  margin-bottom:4px;
}

.form-control, .form-select{
  border-radius:10px;
  font-size:.9rem;
  padding:10px 12px;
}

.form-control:focus, .form-select:focus{
  border-color:#10a37f;
  box-shadow:0 0 0 2px rgba(16,163,127,.15);
}

.image-preview{
  height:220px;
  border-radius:12px;
  overflow:hidden;
  background:#f1f5f9;
  display:flex;
  align-items:center;
  justify-content:center;
}

.image-preview img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.btn-save{
  background:#10a37f;
  border:0;
  padding:10px 22px;
  border-radius:10px;
  font-weight:600;
}

.btn-save:hover{
  background:#0d8c6c;
}
</style>
</head>

<body>

<div class="container-edit">

  <div class="card-clean p-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
      <h5 class="fw-bold m-0">
        <i class="bi bi-pencil-square me-2"></i>Editar Refacción
      </h5>
      <span class="badge bg-light text-dark border">
        ID: <span id="ref-id-display">---</span>
      </span>
    </div>

    <form id="form" class="form-clean">

      <!-- Nombre -->
      <label>Nombre del producto</label>
      <input type="text" id="nombreprod" class="form-control mb-3" required>

      <!-- Referencia + Categoria -->
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label>Referencia interna</label>
          <input type="text" id="refinterna" class="form-control" disabled>
        </div>

        <div class="col-md-6">
          <label>Categoría</label>
          <select id="categoriaprin" class="form-select"></select>
        </div>
      </div>

      <!-- Tipo Modelo Palabras -->
      <div class="row g-3 mb-3">
        <div class="col-md-4">
          <label>Tipo</label>
          <input type="text" id="tipoprod" class="form-control">
        </div>

        <div class="col-md-4">
          <label>Modelo</label>
          <input type="text" id="modelo" class="form-control">
        </div>

        <div class="col-md-4">
          <label>Palabras clave</label>
          <input type="text" id="palclave" class="form-control">
        </div>
      </div>

      <!-- Inventario -->
      <div class="row g-3 mb-3">
        <div class="col-md-4">
          <label>Cantidad</label>
          <input type="number" id="cantidad" class="form-control">
        </div>

        <div class="col-md-4">
          <label>Unidad</label>
          <input type="text" id="unidad" class="form-control">
        </div>

        <div class="col-md-4">
          <label>Ubicación</label>
          <input type="text" id="ubicacion" class="form-control">
        </div>
      </div>

      <!-- Observación -->
      <label>Observación</label>
      <textarea id="observacion" class="form-control mb-4" rows="3"></textarea>

      <!-- Compatibles -->
      <label class="fw-semibold">Máquinas compatibles</label>

      <div id="lista-maquinas" class="d-flex flex-wrap gap-2 mb-2"></div>

      <button type="button"
              class="btn btn-outline-secondary btn-sm mb-4"
              data-bs-toggle="modal"
              data-bs-target="#modalMaquinas">
        <i class="bi bi-plus"></i> Agregar máquina
      </button>

      <!-- Imagen -->
      <label class="fw-semibold">Imagen</label>

      <div class="image-preview mb-2">
        <img id="previewImagen" style="display:none;" />
      </div>

      <input type="file" id="imagen" class="form-control mb-2" accept="image/*">
      <input type="text" id="imagenUrl" class="form-control mb-3" placeholder="O pega URL externa">

      <button type="button"
              id="btnEliminarImagen"
              class="btn btn-outline-danger btn-sm mb-4">
        <i class="bi bi-trash"></i> Eliminar imagen
      </button>

      <!-- Guardar -->
      <div class="text-end">
        <button type="submit" class="btn btn-save text-white">
          <i class="bi bi-floppy"></i> Guardar cambios
        </button>
      </div>

    </form>
  </div>
</div>

<!-- MODAL MAQUINAS -->
<div class="modal fade" id="modalMaquinas" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">
          <i class="bi bi-hdd-stack"></i> Seleccionar Máquinas
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <!-- Buscador -->
        <input type="text"
               id="buscarMaquina"
               class="form-control mb-3"
               placeholder="Buscar máquina...">

        <!-- Lista -->
        <div id="lista-maquinas-modal" class="row g-2"></div>

      </div>

      <div class="modal-footer">
        <button class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-success" id="confirmarMaquinas">
          Confirmar seleccion
        </button>
      </div>

    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="detalle.js" defer></script>

</body>
</html>
