<div class="container-panel">

  <div class="panel-card">

    <!-- HEADER -->
    <div class="panel-header">
      <div>
        <strong>Editar Refacción</strong>
        <span class="panel-id">ID: <span id="ref-id-display">---</span></span>
      </div>

      <button type="submit" form="form" class="btn-save">
        Guardar
      </button>
    </div>

    <form id="form">

      <div class="panel-grid">

        <!-- IMAGEN -->
        <div class="box image-box">
          <div class="box-title">Imagen</div>

          <div class="image-preview">
            <img id="previewImagen" style="display:none;">
          </div>

          <input type="file" id="imagen" class="form-control mt-2">
          <input type="text" id="imagenUrl" class="form-control mt-2" placeholder="URL externa">

          <button type="button"
                  id="btnEliminarImagen"
                  class="btn btn-outline-danger btn-sm mt-2">
            Eliminar
          </button>
        </div>

        <!-- DATOS PRINCIPALES -->
        <div class="box">
          <div class="box-title">Datos</div>

          <input id="nombreprod" class="form-control mb-2" placeholder="Nombre">

          <div class="row g-2 mb-2">
            <div class="col-6">
              <input id="refinterna" class="form-control" placeholder="Referencia" disabled>
            </div>
            <div class="col-6">
              <select id="categoriaprin" class="form-select"></select>
            </div>
          </div>

          <div class="row g-2 mb-2">
            <div class="col-6">
              <input id="tipoprod" class="form-control" placeholder="Tipo">
            </div>
            <div class="col-6">
              <input id="modelo" class="form-control" placeholder="Modelo">
            </div>
          </div>

          <input id="palclave" class="form-control" placeholder="Palabras clave">
        </div>

        <!-- INVENTARIO -->
        <div class="box">
          <div class="box-title">Inventario</div>

          <div class="row g-2">
            <div class="col-6">
              <input id="cantidad" type="number" class="form-control" placeholder="Cantidad">
            </div>
            <div class="col-6">
              <input id="unidad" class="form-control" placeholder="Unidad">
            </div>
          </div>
        </div>

        <!-- UBICACION -->
        <div class="box">
          <div class="box-title">Ubicación / Observación</div>

          <input id="ubicacion" class="form-control mb-2" placeholder="Ubicación">

          <textarea id="observacion"
                    class="form-control"
                    rows="3"
                    placeholder="Observación"></textarea>
        </div>

      </div>

      <!-- COMPATIBLES -->
      <div class="box full">
        <div class="box-title">Máquinas compatibles</div>

        <div id="lista-maquinas" class="d-flex flex-wrap gap-2 mb-2"></div>

        <button type="button"
                class="btn btn-outline-secondary btn-sm"
                data-bs-toggle="modal"
                data-bs-target="#modalMaquinas">
          Agregar máquina
        </button>
      </div>

    </form>

  </div>
</div>

<!-- MODAL MAQUINAS -->
<div class="modal fade" id="modalMaquinas" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">
          <i class="bi bi-hdd-stack"></i> Seleccionar Máquinas
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <!-- Buscador -->
        <input type="text"
               id="buscarMaquina"
               class="form-control mb-3"
               placeholder="Buscar máquina...">

        <!-- Lista -->
        <div id="lista-maquinas-modal" class="row g-2"></div>

      </div>

      <div class="modal-footer">
        <button class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-success" id="confirmarMaquinas">
          Confirmar seleccion
        </button>
      </div>

    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
